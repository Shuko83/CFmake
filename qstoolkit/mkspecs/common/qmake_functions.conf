# -- function: TEMPLATE( types ) -- #

defineTest( TEMPLATE ) {

    arg.types = $${1}

    !isEmpty( arg.types ) {

        arg.types = $$split( arg.types, | )
        template = $$remove( TEMPLATE, ^vc )

        equals( template, lib ): \
            vcaux: template = aux

        contains( arg.types, pseudo ) {

            equals( template, aux )| \
            equals( template, subdirs ): \
                return( true )
        }

        contains( arg.types, binary ) {

            equals( template, app )| \
            equals( template, lib ): \
                return( true )
        }

        contains( arg.types, $${template} ): \
            return( true )

        equals( template, lib ) {

            contains( arg.types, plugin ): \
                plugin: return( true )

            static_or_shared| \
            !static_and_shared|build_pass {

                contains( arg.types, static ) {

                    CONFIG( static,    shared|dll|dylib|static )| \
                    CONFIG( staticlib, shared|dll|dylib|staticlib ): return( true )
                }

                contains( arg.types, shared ) {

                    CONFIG( static,    shared|dll|dylib|static )| \
                    CONFIG( staticlib, shared|dll|dylib|staticlib ): return( false )

                    return( true )
                }
            }
        }
    }

    return( false )
}


# -- function: append( variablename, suffix ) -- #

defineReplace( append ) {

    arg.variable = $${1}
    arg.suffix = $${2}

    !isEmpty( $${arg.variable} ) {

        value = $$eval( $${arg.variable} )

        isEmpty( arg.suffix ): \
            return( $${value} )

        for( string, value ): \
            result += $${string}$${arg.suffix}
    }

    return( $${result} )
}

