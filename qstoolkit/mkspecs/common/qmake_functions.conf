# -- function: resolve_debug_modifiers( variablename ) -- #

defineTest( resolve_debug_modifiers ) {

    arg.variable = $${1}

    !isEmpty( $${arg.variable} ) {

        values = $$eval( $${arg.variable} )
        clear( $${arg.variable} )

        for( value, values ) {

            build_mode( release ):     eval( $${arg.variable} += $$remove( value, \\[[^\\]]*\\] ) )
            else: build_mode( debug ): eval( $${arg.variable} += $$remove( value, [\\[\\]] ) )
        }

        export( $${arg.variable} )
        return( true )
    }

    return( false )
}

