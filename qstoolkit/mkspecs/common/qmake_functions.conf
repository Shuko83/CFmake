                else: eval( $${arg.variable} *= $$relative_path( $${file}, $${arg.base} ) )
            }
        }

        export( $${arg.variable} )
        return( true )
    }

    return ( false )
}

# -- function: is_absolute_path( path ) -- #

defineTest( is_absolute_path ) {

    arg.path = $${1}

    !isEmpty( arg.path ) {

        equals( QMAKE_HOST.os, Windows ) {

            startsWith( arg.path, [A-Za-z]: ): \
                return( true )
        }

        else: equals( QMAKE_HOST.os, Linux ) {

            startsWith( arg.path, $$re_escape( / ) ): \
                return( true )
        }
    }

    return( false )
}

