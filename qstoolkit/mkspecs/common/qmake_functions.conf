# -- function: qtGreaterThan( version[, equals] ) -- #

defineTest( qtGreaterThan ) {

    arg.version = $${1}
    arg.equals = $${2}

    version = $$remove( arg.version, ^(?:\\d{1,3}(?:\\.\\d{1,3}){1,2})$ )

    !isEmpty( arg.version ): \
    isEmpty( version ) {

        version = $$split( arg.version, . ) 0

        equals( QMAKE_HOST.os, Windows ) {

            current = $$system( "set /a $${QT_MAJOR_VERSION} * 10000 + $${QT_MINOR_VERSION} * 100 + $${QT_PATCH_VERSION}" )
            version = $$system( "set /a $$member( version, 0 ) * 10000 + $$member( version, 1 ) * 100 + $$member( version, 2 )" )
        }

        else: equals( QMAKE_HOST.os, Linux ) {

            current = $$system( "echo $(($${QT_MAJOR_VERSION} * 10000 + $${QT_MINOR_VERSION} * 100 + $${QT_PATCH_VERSION}))" )
            version = $$system( "echo $(($$member( version, 0 ) * 10000 + $$member( version, 1 ) * 100 + $$member( version, 2 )))" )
        }

        greaterThan( current, $${version} ): \
            return( true )

        equals( arg.equals, true ): \
        equals( current, $${version} ): \
            return( true )
    }

    return( false )
}

