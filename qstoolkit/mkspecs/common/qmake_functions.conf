# -- function: search_parent_until( variablename, filename[, base] ) -- #

defineReplace( search_parent_until ) {

    arg.variable = $${1}
    arg.filename = $${2}
    arg.base = $${3}

    !isEmpty( $${arg.variable} ): \
    !isEmpty( arg.filename ) {

        value = $$absolute_path( $$eval( $${arg.variable} ), $${arg.base} )
        value = $$dirname( value )

        !isEmpty( value ) {

            subdirs = $$split( value, / )

            for( subdir, subdirs ) {

                exists( $${value}/$${arg.filename} ): break()
                value = $$dirname( value )
            }

            return( $${value} )
        }
    }

    return( )
}

# -- function: TARGET( [mode] ) -- #

defineReplace( TARGET ) {

    arg.mode = $${1}

    isEmpty( ARGS ): \
        unset( arg.mode )

    equals( arg.mode, debug ): return( $$remove( TARGET, [\\[\\]] ) )
    else: return( $$remove( TARGET, \\[[^\\]]*\\] ) )
}


# -- function: absolute_path( path[, base ] ) -- #
#    qmake 3.0 (Qt5.0) backward compatibility

qtLessThan( 5.0 ): \
defineReplace( absolute_path ) {

    arg.path = $${1}
    arg.base = $${2}

    !isEmpty( arg.path ): \
    !is_absolute_path( $${arg.path} ) {

        isEmpty( arg.base ): \
            arg.base = $${_PRO_FILE_PWD_}

        else: is_relative_path( $${arg.base} ): \
            arg.base = $${_PRO_FILE_PWD_}/$${arg.base}

        arg.path = $${arg.base}/$${arg.path}
    }

    return( $$clean_path( $${arg.path} ) )
}

# -- function: clean_path( path ) -- #
#    qmake 3.0 (Qt5.0) backward compatibility

qtLessThan( 5.0 ): \
defineReplace( clean_path ) {

    arg.path = $${1}

    !isEmpty( arg.path ) {

        win32: arg.path = $$replace( arg.path, \\\\, / )
        startsWith( arg.path, /.* ): prefix = /

        subdirs = $$split( arg.path, / )

        for( subdir, subdirs ) {

            !equals( subdir, . ): \
            !equals( subdir, .. ): break()

            arg.path = $$remove( arg.path, ^$${subdir}[/]? )
            equals( subdir, .. ): prefix = $${prefix}../
        }

        subdirs = $$split( arg.path, / )
        clear( arg.path )

        for( subdir, subdirs ) {

            equals( subdir, .. ) {

                count( arg.path, 1 ): \
                is_absolute_path( $${arg.path} ): \
                    root = $${arg.path}/$${subdir}/

                isEmpty( arg.path ): prefix = $${prefix}$${subdir}/
                else: arg.path = $$member( arg.path, 0, -2 )
            }

            else: !equals( subdir, . ): \
                arg.path += $${subdir}
        }

        isEmpty( arg.path ): arg.path = $${prefix}
        else: arg.path = $$join( arg.path, /, $${prefix} )

        !isEmpty( root ): \
            arg.path = $${root}$${arg.path}

        return( $${arg.path} )
    }

    return( $${arg.path} )
}

