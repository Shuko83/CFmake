# -- function: relative_path( path[, base ] ) -- #
#    qmake 3.0 (Qt5.0) backward compatibility

qtLessThan( 5.0 ): \
defineReplace( relative_path ) {

    arg.path = $${1}
    arg.base = $${2}

    !isEmpty( arg.path ): \
    !is_relative_path( $${arg.path} ) {

        isEmpty( arg.base ): \
            arg.base = $${_PRO_FILE_PWD_}

        else: is_relative_path( $${arg.base} ): \
            arg.base = $${_PRO_FILE_PWD_}/$${arg.base}

        arg.path = $$clean_path( $${arg.path} )
        arg.base = $$clean_path( $${arg.base} )

        subdirs = $$split( arg.base, / )

        for( subdir, subdirs ) {

            startsWith( arg.path, $${subdir} ) {

                arg.path = $$remove( arg.path, ^$${subdir}[/]? )
                arg.base = $$remove( arg.base, ^$${subdir}[/]? )
            }

            else {

                arg.base = $$split( arg.base, / )
                break()
            }
        }

        !equals( arg.base, $${subdirs} ) {

            for( subdir, arg.base ): \
                arg.path = ../$${arg.path}
        }
    }

    arg.path = $$clean_path( $${arg.path} )
    isEmpty( arg.path ): arg.path = .

    return( $${arg.path} )
}

