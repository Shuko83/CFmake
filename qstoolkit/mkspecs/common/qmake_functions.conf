defineTest( assert ) {

    arg.condition = $${1}

    !if( $$eval( arg.condition ) ) {

        error( "$$basename( _PRO_FILE_ ) processing aborted because an assertion failed: $$escape_expand( \\n\\t ) \
                $$eval( arg.condition ) requirement not met" )
    }

    return( true )
}

