# -- function: build_pass( [types] ) -- #

defineTest( build_pass ) {

    arg.types = $${1}

    isEmpty( ARGS )| \
    equals( arg.types, any ): \
        unset( arg.types )

    debug_and_release: !build_pass: \
        !debug_or_release: return( false )

    TEMPLATE( lib ) {

        static_and_shared: !build_pass: \
            !static_or_shared: return( false )
    }

    isEmpty( arg.types ): return( true )
    TEMPLATE( $${arg.types} ): return( true )

    return( false )
}

