# -- function: write_file( filename[, variablename][, mode] ) -- #
#    qmake 3.0 (Qt5.0) backward compatibility

qtLessThan( 5.0 ): \
defineTest( write_file ) {

    arg.filename = $${1}
    arg.variable = $${2}
    arg.mode = $${3}

    !isEmpty( arg.filename ) {

        arg.filename = $$absolute_path( $${arg.filename}, $${_PRO_FILE_PWD_} )

        directory = $$dirname( arg.filename )
        content = $$eval( $${arg.variable} )

        !exists( $${directory} ) {

            equals( QMAKE_HOST.os, Windows ):     system( "md \"$${directory}\"" )
            else: equals( QMAKE_HOST.os, Linux ): system( "mkdir -p \"$${directory}\"" )
        }

        isEmpty( content ) {

            equals( QMAKE_HOST.os, Windows ):     system( "type nul > \"$${arg.filename}\"" )
            else: equals( QMAKE_HOST.os, Linux ): system( "touch \"$${arg.filename}\"" )
        }

        else {

            equals( arg.mode, append ): redirect = $$quote( >> )
            else:                       redirect = $$quote( > )

            equals( QMAKE_HOST.os, Windows ) {

                content = $$replace( content, $$re_escape( < ), ^< )
                content = $$replace( content, $$re_escape( > ), ^> )
            }

            else: equals( QMAKE_HOST.os, Linux ) {

                content = $$replace( content, $$re_escape( < ), \\< )
                content = $$replace( content, $$re_escape( > ), \\> )
            }

            content = $$replace( content, $$escape_expand( \\r\\n ), $$escape_expand( \\n ) )
            content = $$split( content, $$escape_expand( \\n ) )

            for( line, content ) {

                equals( QMAKE_HOST.os, Windows ):     system( "echo:$${line} $${redirect} \"$${arg.filename}\"" )
                else: equals( QMAKE_HOST.os, Linux ): system( "echo $${line} $${redirect} \"$${arg.filename}\"" )

                redirect = $$quote( >> )
            }
        }

        return( true )
    }

    return( false )
}


