build_pass( binary ) {

    # -- Visual C++ compiler flags -- #

    msvc {

        # -- TO REMOVE: deprecated rules skip Visual C++ compiler flags definitions -- #
        !deprecated_rules {
        # -- TO REMOVE: deprecated rules skip Visual C++ compiler flags definitions -- #


        ## C++ compiler flags

        QMAKE_CXXFLAGS *= -MP                                                       # enables multi-processors compilation

        msvc-proj: QMAKE_CXXFLAGS_EXCEPTIONS_OFF *= -EH                             # defines no exception handling model (if exceptions support is deactivated)
        QMAKE_CXXFLAGS_STL_ON = $$remove( QMAKE_CXXFLAGS_STL_ON, ^[-|/]EH.* )       # removes exception handling model stored in STL flags

        QMAKE_CXXFLAGS = $$remove( QMAKE_CXXFLAGS, ^[-|/]RTC.* )
        QMAKE_CXXFLAGS_RELEASE = $$remove( QMAKE_CXXFLAGS_RELEASE, ^[-|/]RTC.* )
        QMAKE_CXXFLAGS_DEBUG *= -RTCs                                               # enables stack frame run-time errors check in debug mode

        QMAKE_CXXFLAGS_WARN_ON = -W4                                                # enables level 4 compiler warnings (if warn_on option is set)

        qt {

            QMAKE_CXXFLAGS *= -wd4127 -wd4512 -wd4714                               # hushes some known Qt warnings
            QMAKE_CXXFLAGS_RELEASE *= -wd4718                                       # hushes some known Qt warnings in release mode
            QMAKE_CXXFLAGS_RELEASE_WITH_DEBUGINFO *= -wd4718
        }

        ## C compiler flags

        QMAKE_CFLAGS *= -MP

        QMAKE_CFLAGS = $$remove( QMAKE_CFLAGS, ^[-|/]RTC.* )
        QMAKE_CFLAGS_RELEASE = $$remove( QMAKE_CFLAGS_RELEASE, ^[-|/]RTC.* )
        QMAKE_CFLAGS_DEBUG *= -RTCs

        QMAKE_CFLAGS_WARN_ON = -W4

        qt {

            QMAKE_CFLAGS *= -wd4127 -wd4512 -wd4714                               # hushes some known Qt warnings
            QMAKE_CFLAGS_RELEASE *= -wd4718                                       # hushes some known Qt warnings in release mode
            QMAKE_CFLAGS_RELEASE_WITH_DEBUGINFO *= -wd4718
        }

        ## linker flags

        QMAKE_LFLAGS *= /INCREMENTAL:NO                                             # disables incremental link

        qtLessThan( 4.8 ) {

            # defines /MACHINE linker option for qmake 2.01 (Qt4.7) compatibility

            equals( TOOLKIT.host.arch, x86 ):       QMAKE_LFLAGS *= /MACHINE:X86    # specifies x86 target platform
            else: equals( TOOLKIT.host.arch, x64 ): QMAKE_LFLAGS *= /MACHINE:X64    # specifies x64 target platform
        }


        }

        ## archiver flags

        TEMPLATE( static ): \
        !isEmpty( COMBINED_LIBS ): \
            QMAKE_LIBFLAGS *= $${COMBINED_LIBS}                                     # registers combined static libraries (static library only)
    }


    # -- GCC compiler flags -- #

    else: gcc {

        # -- TO REMOVE: deprecated rules skip GCC compiler flags definitions -- #
        !deprecated_rules {
        # -- TO REMOVE: deprecated rules skip GCC compiler flags definitions -- #


        mingw: QMAKE_LINK_OBJECT_MAX = 1000                                                     # increase maximum objects supported without MRI librarian script (MinGW compiler only)
                                                                                                # by default set to 10 in qmake default configuration

        ## linker flags

        linux: TEMPLATE( app ): \
            QMAKE_RPATHDIR = $${LITERAL_DOLLAR}$${LITERAL_DOLLAR}ORIGIN $${QMAKE_RPATHDIR}      # add application path to shared libraries search path


        }

        ## archiver flags

        TEMPLATE( static ): \
        !isEmpty( COMBINED_LIBS ) {                                                             # MRI librarian script generation: (static library only)
                                                                                                # registration of combined static libraries
            QMAKE_AR_CMD = @echo \'create $(DESTDIR)$(TARGET)

            for( library, COMBINED_LIBS ): \
                QMAKE_AR_CMD = $${QMAKE_AR_CMD}\\naddlib $${library}

            !isEmpty( SOURCES )| \
            !isEmpty( GENERATED_SOURCES ): \
                QMAKE_AR_CMD = $${QMAKE_AR_CMD}\\naddmod $(OBJECTS)

            QMAKE_AR_CMD = $${QMAKE_AR_CMD}\\nsave\\nend\' > $(QMAKE_TARGET).mri$$escape_expand( \\n\\t )
            QMAKE_AR_CMD = $${QMAKE_AR_CMD}ar -M < $(QMAKE_TARGET).mri && $(DEL_FILE) $(QMAKE_TARGET).mri
        }
    }
}
