# -- function: add_library( type, path, targets ) -- #

defineTest( add_library ) {

    arg.type = $${1}
    arg.path = $${2}
    arg.targets = $${3}

    contains( arg.type, static|shared|combined ) {

        !isEmpty( arg.path ): \
        !isEmpty( arg.targets ): \
            build_pass( binary ) {

                TEMPLATE( static ) {

                    !equals( arg.type, combined ): \
                        return( false )

                    equals( arg.path, system ): \
                        return( false )

                    arg.type = static
                    static_combined = true
                }

                else {

                    equals( arg.type, combined ): \
                        arg.type = static

                    static_combined = false
                }

                equals( arg.path, system ): \
                    LIBS += $$prepend( arg.targets, -l )

                else {

                    !equals( arg.type, shared ): \
                        extension = $${QMAKE_EXT_STATICLIB}

                    else {

                        win32: extension = $${QMAKE_EXT_IMPLIB}
                        else:  extension = $${QMAKE_EXT_SHLIB}
                    }

                    arg.path = $$replace( arg.path, $$re_escape( ${LIBRARY_MODE} ), $${arg.type} )

                    for( library, arg.targets ) {

                        endsWith( library, $$re_escape( [.ext] ) ): \
                            library = $$replace( library, $$re_escape( [.ext] ), $${extension} )

                        !endsWith( library, \\.[^\\.]+ ) {

                            library = $${library}$${extension}
                            linux: library = lib$${library}
                        }

                        startsWith( arg.path, \\$\\{\\w+\\} ): library = $${arg.path}/$${library}
                        else: library = $$relative_path( $${arg.path}/$${library}, $${_PRO_FILE_PWD_} )

                        equals( static_combined, true ): \
                            COMBINED_LIBS *= $${library}

                        else: LIBS += $${library}

                        equals( arg.type, static ): \
                            PRE_TARGETDEPS *= $${library}
                    }
                }

                export( LIBS )
                export( COMBINED_LIBS )
                export( PRE_TARGETDEPS )

                return( true )
            }
    }

    return( false )
}

# -- function: add_plugin( path, targets ) -- #

defineTest( add_plugin ) {

    arg.path = $${1}
    arg.targets = $${2}

    !isEmpty( arg.path ): \
    !isEmpty( arg.targets ): \
        build_pass( binary ) {

            arg.path = $$replace( arg.path, $$re_escape( ${LIBRARY_MODE} ), shared )

            for( plugin, arg.targets ) {

                endsWith( plugin, $$re_escape( [.ext] ) ): \
                    plugin = $$replace( plugin, $$re_escape( [.ext] ), $${QMAKE_EXT_SHLIB} )

                !endsWith( plugin, \\.[^\\.]+ ) {

                    plugin = $${plugin}$${QMAKE_EXT_SHLIB}
                    linux: plugin = lib$${plugin}
                }

                startsWith( arg.path, \\$\\{\\w+\\} ): PLUGINS *= $${arg.path}/$${plugin}
                else: PLUGINS *= $$relative_path( $${arg.path}/$${plugin}, $${_PRO_FILE_PWD_} )
            }

            export( PLUGINS )
            return( true )
        }

    return( false )
}

# -- function: add_subdir( target, path[, depends] ) -- #

defineTest( add_subdir ) {

    arg.target = $${1}
    arg.path = $${2}
    arg.depends = $${3}

    TEMPLATE( subdirs ): \
    !isEmpty( arg.target ) {

        contains( SUBDIRS, $${arg.target} ): \
            qserror( "Subdirectory target '$${arg.target}' already defined" )

        isEmpty( arg.path ): arg.path = $${arg.target}
        else: arg.path = $$clean_path( $${arg.path} )

        endsWith( arg.path, $$re_escape( .pro ) ) {

            subdir = $$absolute_path( $$dirname( arg.path ), $${_PRO_FILE_PWD_} )

            equals( subdir, $${_PRO_FILE_PWD_} ): \
                qserror( "'$${arg.target}' does not define a subdirectory project" )

            !exists( $${arg.path} ): \
                qserror( "'$${arg.target}' subdirectory project not found" )

            eval( $${arg.target}.file = $${arg.path} )
            export( $${arg.target}.file )
        }

        else {

            !exists( $${arg.path}/$$basename( arg.path ).pro ): \
                qserror( "'$${arg.target}' subdirectory project not found" )

            eval( $${arg.target}.subdir = $${arg.path} )
            export( $${arg.target}.subdir )
        }

        !isEmpty( arg.depends ) {

            arg.depends = $$unique( arg.depends )

            resolved = $${arg.depends}
            resolved -= $${SUBDIRS}

            !isEmpty( resolved ): \
                qserror( "'$${arg.target}' dependency(ies) [$${resolved}] not found" )

            for( depend, arg.depends ): \
                eval( $${arg.target}.depends += $${depend} )

            export( $${arg.target}.depends )
        }

        SUBDIRS += $${arg.target}
        export( SUBDIRS )

        return( true )
    }

    return( false )
}
