<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>StreamWork Console 1.0</title>
<link rel="icon" type="image/jpg" href="/_console.jpg" />
<style type="text/css">
<!--

<script language="JavaScript" type="text/javascript">
			var receiveReq = getXmlHttpRequestObject();
			var mTimer;
			var dataReceived;
			//Function for initializating the page.
			function startConsole() {
				var div_console = document.getElementById('div_console');
				//div_console.innerHTML ="Starting";
				dataReceived=false;
				getConsoleText();
			}		
			//Gets the browser specific XmlHttpRequest Object
			function getXmlHttpRequestObject() {
				if (window.XMLHttpRequest) {
					return new XMLHttpRequest();
				} else if(window.ActiveXObject) {
					return new ActiveXObject("Microsoft.XMLHTTP");
				} else {
					document.getElementById('p_status').innerHTML = 'Status: Cound not create XmlHttpRequest Object.  Consider upgrading your browser.';
				}
			}
			
			//Gets the current messages from the server
			function getConsoleText() {
				clearTimeout(mTimer);
				if (receiveReq.readyState == 4 || receiveReq.readyState == 0) {
					receiveReq.setTimeouts(4000);
					receiveReq.open("GET", '_console.xml', true);
					receiveReq.onreadystatechange = handleReceiveConsole; 
					receiveReq.send(null);
				}			
				mTimer=setTimeout('handleReceiveConsole();',5000);
			}
			
			function handleReceiveConsole() {
				clearTimeout(mTimer);
				if (receiveReq.readyState == 4) {
					//Get a reference to our chat container div for easy access
					var div_console = document.getElementById('div_console');
					//Get the AJAX response and run the JavaScript evaluation function
					//on it to turn it into a useable object.  Notice since we are passing
					//in the JSON value as a string we need to wrap it in parentheses
					//var response = eval("(" + receiveReq.responseText+ ")");
					//for(i=0;i < response.messages.message.length; i++) {
					if (receiveReq.status==200) {
						document.getElementById('p_status').innerHTML = 'Status: Online';
						if ( receiveReq.responseText.length>0) {
							div_console.innerHTML +=receiveReq.responseText;
							div_console.innerHTML +='<br/>';
							div_console.scrollTop = div_console.scrollHeight;
						}
					} else if (receiveReq.status!=0) {
						document.getElementById('p_status').innerHTML = 'Status: Offline';
					}
					mTimer = setTimeout('getConsoleText();',1000);
						
					//}
				} else if (receiveReq.readyState == 1) {
						document.getElementById('p_status').innerHTML = 'Status: Offline';
						mTimer = setTimeout('getConsoleText();',5000);
				}
				; //Refresh our chat in 2 seconds

			}

		</script>
</head>

<body onLoad="javascript:startConsole();">
<h1 class="style1">Console</h1>(refresh ~500 ms)
<p id="p_status">Status: Online</p>
<div id="div_console" style="height: 500px; overflow: auto; background-color: #EEEEEE; border: 1px solid #111111;"></div>
</body>
</html>
